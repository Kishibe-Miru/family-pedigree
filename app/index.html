<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>精神科遗传家族谱系图 2.0</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">谱</div>
        <div>
          <h1>精神科遗传家族谱系图</h1>
          <p id="projectMeta">未命名家系图</p>
        </div>
      </div>
      <div class="top-actions" aria-label="项目操作">
        <button class="icon-button" id="newProjectBtn" title="新建项目" aria-label="新建项目">＋</button>
        <button class="icon-button" id="saveJsonBtn" title="保存 JSON" aria-label="保存 JSON">S</button>
        <label class="icon-button file-action" title="加载 JSON" aria-label="加载 JSON">
          O
          <input id="loadJsonInput" type="file" accept="application/json,.json">
        </label>
        <button class="primary-button" id="exportPngBtn">导出 PNG</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel left-panel" aria-label="绘制操作">
        <section class="panel-section">
          <h2>成员</h2>
          <button class="wide-button" id="addPersonBtn">添加成员</button>
          <button class="wide-button" id="setProbandBtn">设为先证者</button>
          <button class="wide-button danger" id="deletePersonBtn">删除选中</button>
        </section>

        <section class="panel-section">
          <h2>亲属关系</h2>
          <div class="button-grid">
            <button id="addFatherBtn">父亲</button>
            <button id="addMotherBtn">母亲</button>
            <button id="addPartnerBtn">配偶</button>
            <button id="addChildBtn">子女</button>
            <button id="addSiblingBtn">兄弟姐妹</button>
            <button id="autoLayoutBtn">自动排版</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>视图</h2>
          <div class="button-grid compact">
            <button id="zoomInBtn" title="放大">＋</button>
            <button id="zoomOutBtn" title="缩小">-</button>
            <button id="resetViewBtn">重置</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>图例</h2>
          <div class="legend">
            <span><i class="legend-shape square"></i>男性</span>
            <span><i class="legend-shape circle"></i>女性</span>
            <span><i class="legend-shape diamond"></i>未知</span>
            <span><i class="legend-fill"></i>患病</span>
          </div>
        </section>
      </aside>

      <section class="canvas-panel" aria-label="谱系图画布">
        <div class="canvas-toolbar">
          <input id="projectTitleInput" type="text" aria-label="项目名称" value="未命名家系图">
          <div class="status-line" id="statusLine">准备就绪</div>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <svg id="pedigreeSvg" role="img" aria-label="家族谱系图"></svg>
        </div>
      </section>

      <aside class="panel right-panel" aria-label="成员属性">
        <section class="panel-section">
          <h2>属性</h2>
          <div id="emptySelection" class="empty-state">选择一个成员后编辑属性</div>
          <form id="personForm" class="person-form" hidden>
            <label>
              显示名称
              <input id="personName" type="text">
            </label>
            <label>
              性别
              <select id="personSex">
                <option value="male">男性</option>
                <option value="female">女性</option>
                <option value="unknown">未知</option>
              </select>
            </label>
            <label>
              年龄
              <input id="personAge" type="text" inputmode="numeric">
            </label>
            <label>
              出生年份
              <input id="personBirthYear" type="text" inputmode="numeric">
            </label>
            <label>
              疾病状态
              <select id="personAffectedStatus">
                <option value="unaffected">未患病</option>
                <option value="affected">患病</option>
                <option value="suspected">疑似</option>
                <option value="unknown">未知</option>
              </select>
            </label>
            <label>
              诊断标签
              <select id="diagnosisSelect">
                <option value="">添加诊断</option>
                <option value="精神分裂症">精神分裂症</option>
                <option value="双相情感障碍">双相情感障碍</option>
                <option value="抑郁障碍">抑郁障碍</option>
                <option value="焦虑障碍">焦虑障碍</option>
                <option value="强迫障碍">强迫障碍</option>
                <option value="自闭谱系障碍">自闭谱系障碍</option>
                <option value="注意缺陷多动障碍">注意缺陷多动障碍</option>
                <option value="物质使用障碍">物质使用障碍</option>
                <option value="人格障碍">人格障碍</option>
                <option value="其他">其他</option>
              </select>
            </label>
            <div class="tag-list" id="diagnosisTags"></div>
            <label class="check-row">
              <input id="personDeceased" type="checkbox">
              <span>死亡</span>
            </label>
            <label class="check-row">
              <input id="personProband" type="checkbox">
              <span>先证者</span>
            </label>
            <label>
              备注
              <textarea id="personNotes" rows="4"></textarea>
            </label>
          </form>
        </section>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
