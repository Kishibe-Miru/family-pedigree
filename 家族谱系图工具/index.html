<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>精神科遗传家族谱系图绘制工具 5.2.1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark">⌘</span>
      <div>
        <h1>家族谱系图绘制工具 <span class="ver">5.2.1</span></h1>
        <p id="projectMeta" class="brand-sub">未命名家系图 · 0 名成员</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="undoBtn" class="ghost-btn" title="撤销 (Ctrl+Z)" disabled>↶ 撤销</button>
      <button id="redoBtn" class="ghost-btn" title="重做 (Ctrl+Y)" disabled>↷ 重做</button>
      <span class="divider"></span>
      <button id="newProjectBtn" class="ghost-btn" title="新建空白家系图">新建</button>
      <button id="saveJsonBtn" class="ghost-btn" title="保存为 JSON 项目文件">保存项目</button>
      <label for="loadJsonInput" class="ghost-btn file-label" title="加载 JSON 项目文件">加载项目</label>
      <input id="loadJsonInput" type="file" accept="application/json,.json" hidden />
      <span class="divider"></span>
      <button id="exportPngBtn" class="primary-btn" title="导出 PNG 图片">导出 PNG</button>
      <button id="exportSvgBtn" class="primary-btn" title="导出 SVG 矢量图">导出 SVG</button>
    </div>
  </header>

  <main class="app-main">
    <!-- 左侧操作栏 -->
    <aside class="panel left-panel">
      <section class="panel-block">
        <h2 class="panel-title">开始</h2>
        <button id="addProbandBtn" class="action-btn accent">＋ 添加先证者</button>
        <button id="addPersonBtn" class="action-btn">＋ 添加独立成员</button>
        <p class="hint">从先证者开始，选中任意成员后用下方按钮扩展家系。</p>
      </section>

      <section class="panel-block">
        <h2 class="panel-title">为选中成员添加亲属</h2>
        <div class="relation-grid">
          <button id="addFatherBtn" class="action-btn" disabled>父亲 <kbd>F</kbd></button>
          <button id="addMotherBtn" class="action-btn" disabled>母亲 <kbd>M</kbd></button>
          <button id="addPartnerBtn" class="action-btn span2" disabled>配偶 <kbd>E</kbd></button>
          <button id="addOlderBrotherBtn" class="action-btn" disabled>哥哥</button>
          <button id="addYoungerBrotherBtn" class="action-btn" disabled>弟弟 <kbd>B</kbd></button>
          <button id="addOlderSisterBtn" class="action-btn" disabled>姐姐</button>
          <button id="addYoungerSisterBtn" class="action-btn" disabled>妹妹 <kbd>S</kbd></button>
          <button id="addSonBtn" class="action-btn" disabled>儿子 <kbd>C</kbd></button>
          <button id="addDaughterBtn" class="action-btn" disabled>女儿 <kbd>D</kbd></button>
          <button id="addOlderTwinBrotherBtn" class="action-btn" disabled>孪生哥哥</button>
          <button id="addYoungerTwinBrotherBtn" class="action-btn" disabled>孪生弟弟</button>
          <button id="addOlderTwinSisterBtn" class="action-btn" disabled>孪生姐姐</button>
          <button id="addYoungerTwinSisterBtn" class="action-btn" disabled>孪生妹妹</button>
          <button id="linkPartnerBtn" class="action-btn span2" disabled title="点亮后在画布中点击另一位成员，将两人连为配偶（支持近亲婚配）">💍 与已选成员结婚（连接已有节点）</button>
        </div>
        <p class="hint">「结婚」用于连接两个已存在的成员（如表兄妹婚配）；普通新增配偶请用上面的「配偶」按钮。</p>
      </section>

      <section class="panel-block">
        <h2 class="panel-title">排版与视图</h2>
        <button id="autoLayoutBtn" class="action-btn">↳ 自动排版</button>
        <label class="check-row" title="关闭后，拖动节点将保持手动位置，连线自动跟随"><input type="checkbox" id="optSnapDrag" checked /> 拖动后自动对齐</label>
        <button id="familyHistoryBtn" class="action-btn">📋 生成家族史文字</button>
        <div class="view-row">
          <button id="zoomOutBtn" class="mini-btn" title="缩小">－</button>
          <span id="zoomLabel" class="zoom-label">100%</span>
          <button id="zoomInBtn" class="mini-btn" title="放大">＋</button>
          <button id="resetViewBtn" class="mini-btn wide" title="重置视图">适应</button>
        </div>
      </section>

      <section class="panel-block">
        <h2 class="panel-title">显示选项</h2>
        <label class="check-row"><input type="checkbox" id="optShowNumber" checked /> 世代编号 (I-1)</label>
        <label class="check-row"><input type="checkbox" id="optShowName" checked /> 成员名称</label>
        <label class="check-row"><input type="checkbox" id="optShowDiagnosis" checked /> 诊断标签</label>
        <label class="check-row"><input type="checkbox" id="optShowAge" /> 年龄 / 出生年</label>
        <label class="check-row"><input type="checkbox" id="optShowLegend" checked /> 图例</label>
        <label class="check-row"><input type="checkbox" id="optShowTitle" checked /> 标题区</label>
      </section>

      <p class="kbd-hint">快捷键：F 父 · M 母 · E 配偶 · B 弟弟 · S 妹妹 · C 儿子 · D 女儿 · Del 删除 · Ctrl+Z 撤销 · 空白处拖动平移画布</p>
    </aside>

    <!-- 中间画布 -->
    <section class="canvas-area" id="canvasArea">
      <div class="canvas-wrap" id="canvasWrap">
        <svg id="pedigreeSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="status-line" id="statusLine">就绪</div>
    </section>

    <!-- 右侧属性栏 -->
    <aside class="panel right-panel">
      <div id="emptySelection" class="empty-state">
        <p class="empty-emoji">○ □ ◇</p>
        <p>未选中成员</p>
        <p class="hint">在画布中点击一个节点，或先添加先证者。</p>
      </div>

      <form id="personForm" class="person-form" hidden onsubmit="return false">
        <h2 class="panel-title">成员属性</h2>

        <label class="field"><span>显示名称</span>
          <input id="personName" type="text" placeholder="如 II-3 或 姓名" />
        </label>

        <div class="field-row">
          <label class="field"><span>性别</span>
            <select id="personSex">
              <option value="male">男性 □</option>
              <option value="female">女性 ○</option>
              <option value="unknown">未知 ◇</option>
            </select>
          </label>
          <label class="field"><span>疾病状态</span>
            <select id="personAffectedStatus">
              <option value="unaffected">未患病</option>
              <option value="affected">患病</option>
              <option value="suspected">疑似</option>
              <option value="carrier">携带者（纹理）</option>
              <option value="unknown">未知</option>
            </select>
          </label>
        </div>

        <div class="field-row">
          <label class="field"><span>年龄</span>
            <input id="personAge" type="text" placeholder="如 42" />
          </label>
          <label class="field"><span>出生年份</span>
            <input id="personBirthYear" type="text" placeholder="如 1984" />
          </label>
        </div>

        <div class="check-grid">
          <label class="check-row"><input type="checkbox" id="personDeceased" /> 已故 (／)</label>
          <label class="check-row"><input type="checkbox" id="personProband" /> 先证者 (箭头)</label>
          <label class="check-row" id="identicalRow" hidden><input type="checkbox" id="personIdentical" /> 同卵双胞胎</label>
        </div>

        <label class="field"><span>精神科诊断</span>
          <select id="diagnosisSelect">
            <option value="">＋ 选择诊断标签…</option>
            <option>精神分裂症</option>
            <option>双相情感障碍</option>
            <option>抑郁障碍</option>
            <option>焦虑障碍</option>
            <option>强迫障碍</option>
            <option>自闭谱系障碍</option>
            <option>注意缺陷多动障碍</option>
            <option>物质使用障碍</option>
            <option>人格障碍</option>
            <option>其他</option>
          </select>
        </label>
        <div id="diagnosisTags" class="tag-row"></div>

        <label class="field"><span>备注</span>
          <textarea id="personNotes" rows="2" placeholder="临床备注…"></textarea>
        </label>

        <div class="form-actions">
          <button type="button" id="setProbandBtn" class="action-btn small">设为先证者</button>
          <button type="button" id="clearManualBtn" class="action-btn small">取消固定位置</button>
          <button type="button" id="deletePersonBtn" class="action-btn small danger">删除成员</button>
        </div>
      </form>
    </aside>
  </main>

  <dialog id="historyDialog" class="history-dialog">
    <h2 class="panel-title">家族史结构化草稿（需临床复核）</h2>
    <textarea id="historyText" rows="14" readonly></textarea>
    <div class="form-actions">
      <button type="button" id="copyHistoryBtn" class="action-btn small">复制到剪贴板</button>
      <button type="button" id="closeHistoryBtn" class="action-btn small">关闭</button>
    </div>
  </dialog>

  <script src="domain/person.js"></script>
  <script src="domain/union.js"></script>
  <script src="domain/parentage.js"></script>
  <script src="domain/phenotype.js"></script>
  <script src="domain/genetic-finding.js"></script>
  <script src="domain/pregnancy.js"></script>
  <script src="layout/generation.js"></script>
  <script src="layout/ordering.js"></script>
  <script src="layout/routing.js"></script>
  <script src="layout/collision.js"></script>
  <script src="application/migration.js"></script>
  <script src="application/validation.js"></script>
  <script src="application/history.js"></script>
  <script src="application/commands.js"></script>
  <script src="ui/form.js"></script>
  <script src="ui/canvas.js?v=5.2.1-layout-20260627"></script>
  <script src="ui/export.js"></script>
  <script src="engine.bundle.js?v=5.2.1-layout-20260627"></script>
  <script src="app.js?v=5.2.1-layout-20260627"></script>
</body>
</html>
